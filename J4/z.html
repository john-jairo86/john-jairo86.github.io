<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Tipificaciones Internet</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.css"/>

<style>

body{
background:#222;
color:white;
}

.list-group-item{
cursor:pointer;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="text-center mb-4">Tipificaciones Internet</h3>

<fieldset class="p-3 border rounded">

    <div class="mb-3">
    <button class="btn btn-success btn-sm" id="btnAddOption">
    <i class="fa fa-plus"></i> Agregar
    </button>
    </div>
    
<input type="text" class="form-control mb-3" id="searchInput" placeholder="Buscar...">


<ul id="optionsList" class="list-group"></ul>

</fieldset>

<input type="hidden" id="selectedValue">

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.min.js"></script>

<script>

let options = JSON.parse(localStorage.getItem("internetOptions")) || [

"Cliente sin internet, reset eléctrico servicio ok.",

"Cliente se comunica para cambiar la contraseña, se realiza cambio cliente se conecta.",

"Cliente con fallas en su servicio, se verifica en sistema y vemos pérdida de señal luz LOS.",

"Cliente con fallas en el servicio se verifica en sistema y vemos la ONT en estado power off.",

"Cliente con fallas en el servicio se verifica en sistema y vemos la ONT en estado Desconocido.",

"Cliente con fallas en el servicio se verifica en sistema y vemos la ONT conectado con niveles fuera de rango.",

"Cliente con falla en el servicio de internet dice que está intermitente."

];

const optionsList = document.getElementById("optionsList");
const searchInput = document.getElementById("searchInput");
const selectedValue = document.getElementById("selectedValue");

function guardar(){

localStorage.setItem("internetOptions",JSON.stringify(options));

}

function render(){

optionsList.innerHTML="";

options.forEach((text,index)=>{

let li=document.createElement("li");

li.className="list-group-item d-flex justify-content-between align-items-center";

li.innerHTML=`

<span class="texto">${text}</span>

<div>

<button class="btn btn-warning btn-sm editar">
<i class="fa fa-pen"></i>
</button>

<button class="btn btn-danger btn-sm borrar">
<i class="fa fa-trash"></i>
</button>

</div>

`;

li.querySelector(".texto").onclick=()=>{

selectedValue.value=text;

navigator.clipboard.writeText(text);

Swal.fire({
icon:'success',
title:'Copiado',
timer:1000,
showConfirmButton:false
});

};

li.querySelector(".editar").onclick=()=>{

Swal.fire({
title:"Editar texto",
input:"textarea",
inputValue:text,
showCancelButton:true
}).then(r=>{

if(r.isConfirmed){

options[index]=r.value;

guardar();

render();

}

});

};

li.querySelector(".borrar").onclick=()=>{

Swal.fire({
title:"Eliminar?",
icon:"warning",
showCancelButton:true
}).then(r=>{

if(r.isConfirmed){

options.splice(index,1);

guardar();

render();

}

});

};

optionsList.appendChild(li);

});

}

render();

document.getElementById("btnAddOption").addEventListener("click",()=>{

Swal.fire({
title:"Nueva tipificación",
input:"textarea",
showCancelButton:true
}).then(r=>{

if(r.isConfirmed && r.value){

options.push(r.value);

guardar();

render();

}

});

});

searchInput.addEventListener("keyup",()=>{

let filtro=searchInput.value.toLowerCase();

let items=optionsList.getElementsByTagName("li");

for(let i=0;i<items.length;i++){

let txt=items[i].innerText.toLowerCase();

items[i].style.display=txt.includes(filtro) ? "" : "none";

}

});

</script>

</body>
</html>
