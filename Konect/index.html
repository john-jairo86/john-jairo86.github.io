<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataTables.js</title>
    <!-- Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
    <!-- DataTable -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.12.1/css/dataTables.bootstrap5.min.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
        integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.css" />
</head>

<body>

    <br>
    <!-- Dark mode local storage -->
    <div id="div_check">
        <input type="checkbox" class="checkbox" id="checkbox">
        <label for="checkbox" class="checkbox-label">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
            <span class="ball"></span>
        </label>
    </div>
    <br>

    <button class="btn btn-danger" id="deleteDB">Borrar Tabla</button>


    <div class="text-center">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#dataModal"
            onclick="clearForm()">Tipiguía</button>
    </div>


    <div class="container my-4">
        <div class="row">
            <div class="col-sm-12 col-md-12 col-lg-12 col-xl-12">
                <table id="dataTable" class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Area</th>
                            <th>Nombre</th>
                            <th>RUT</th>
                            <th>Dirección</th>
                            <th>ID</th>
                            <th>Board</th>
                            <th>Nodo</th>
                            <th>Observación</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>



    <div class="modal fade" id="dataModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success">
                    <h5 class="modal-title">Tipificar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-dark">
                    <form id="dataForm" class="row g-3">
                        <div class="col-6">
                            <input type="text" class="form-control" id="area" placeholder="Área">
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control text-dark" disabled id="fecha" placeholder="Fecha">
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre Cliente">
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control" id="rut" placeholder="Rut">
                        </div>

                        <div class="col-6">
                            <textarea class="form-control" id="direccion"
                                placeholder="Dirección / Ont / Olt"></textarea>
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control" id="id" placeholder="Id llamada">
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control" id="board" placeholder="Board">
                        </div>

                        <div class="col-6">
                            <input type="text" class="form-control" id="nodo" placeholder="Nodo">
                        </div>


                        <!-- Text areas -->
                        <div class="col-12">
                            <textarea class="form-control" id="observacion" placeholder="Observación"></textarea>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="button" class="btn btn-success" id="saveBtn">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>



    <!-- Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
    <!-- jQuery -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- DataTable -->
    <script src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.12.1/js/dataTables.bootstrap5.min.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.min.js"></script>
</body>

</html>
